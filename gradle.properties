org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Gradle must run on JDK 17 (not JDK 21+ as default on some machines). Examples:
#   macOS Homebrew: export JAVA_HOME=$(/usr/libexec/java_home -v 17)
#   Or: export JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
# Android Studio: use File → Settings → Build → Gradle → Gradle JDK → Embedded JDK 17.
